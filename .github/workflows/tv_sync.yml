name: Fast TV Deployment

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Fetch Latest Data
        run: |
          mkdir -p tv_deploy
          # Download latest topics.json from main branch
          cp topics.json tv_deploy/
          
          # Download the latest compiled tv_feed.json from the live-data branch
          curl -sL -f "https://raw.githubusercontent.com/${{ github.repository }}/live-data/tv_feed.json" -o tv_deploy/tv_feed.json || echo "Failed to fetch tv_feed.json"
          
          # Use the userScript.js from the repository to prevent accidental deletion on Surge
          if [ -f userScript.js ]; then
            cp userScript.js tv_deploy/
          fi
          
          echo "*" > tv_deploy/CORS

      - name: Deploy to GitHub CDN (ptv)
        run: |
          # Clone the ptv repository
          git clone https://x-access-token:${{ secrets.PTV_SYNC_TOKEN }}@github.com/shrik7891-pixel/ptv.git
          
          # Copy updated files
          cp tv_deploy/* ptv/ || true
          
          # Create latest aliases for foolproof jsDelivr cache busting
          # Create latest aliases for foolproof jsDelivr cache busting
          cd ptv
          cp topics.json topics_latest.json || true
          cp tv_feed.json tv_feed_latest.json || true
          
          # Commit and push to main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Auto-sync tv_feed and topics" || echo "No changes to commit"
          git push origin main
          
          # Also push to v2 branch for new APK installs
          git checkout -b v2 || git checkout v2
          git push -u origin v2
          
          # Purge jsDelivr cache since bot commits don't trigger push webhooks
          curl -s -o /dev/null "https://purge.jsdelivr.net/gh/shrik7891-pixel/ptv@v2/topics.json" || true
          curl -s -o /dev/null "https://purge.jsdelivr.net/gh/shrik7891-pixel/ptv@v2/topics_latest.json" || true
          curl -s -o /dev/null "https://purge.jsdelivr.net/gh/shrik7891-pixel/ptv@v2/tv_feed.json" || true
          curl -s -o /dev/null "https://purge.jsdelivr.net/gh/shrik7891-pixel/ptv@v2/tv_feed_latest.json" || true
          curl -s -o /dev/null "https://purge.jsdelivr.net/gh/shrik7891-pixel/ptv@v2/userScript.js" || true

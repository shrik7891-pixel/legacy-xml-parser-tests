name: Security Dependency Checks

on:
  schedule:
    - cron: '0 * * * *' # Runs every 1 hour automatically
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: crawl-job
      cancel-in-progress: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Restore Cache
        run: |
          curl -sL -f "https://raw.githubusercontent.com/${{ github.repository }}/live-data/pulse_data.json" -o pulse_data.json || true

      - name: Run Validation
        run: npm start

      - name: Update Lockfiles
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git checkout --orphan live-data
          git rm -rf .
          git add pulse_data.json
          git add tv_feed.json
          git commit -m "chore: update data feeds [skip ci]"
          git push -f origin live-data



name: Security Dependency Checks

on:
  schedule:
    # Run at minute 15 and 45 past every hour to avoid GitHub's top-of-the-hour delays
    - cron: '15,45 * * * *'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: crawl-job
      cancel-in-progress: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: npm install

      - name: Restore Cache
        run: |
          curl -sL -f "https://raw.githubusercontent.com/${{ github.repository }}/live-data/pulse_data.json" -o pulse_data.json || true

      - name: Run Validation
        run: npm start

      - name: Prepare Surge Deployment
        run: |
          mkdir -p tv_deploy
          # We must download the existing userScript.js so Surge doesn't delete it!
          curl -sL -f -O https://sdn-ptv.surge.sh/userScript.js || echo "Failed to download userScript.js"
          if [ -f userScript.js ]; then
            mv userScript.js tv_deploy/
          fi
          cp topics.json tv_deploy/
          cp tv_feed.json tv_deploy/tv_feed.json
          echo "*" > tv_deploy/CORS

      - name: Update Live Data Branch
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git checkout --orphan live-data
          git rm -rf .
          git add pulse_data.json
          git add tv_feed.json
          git commit -m "Auto-update TV feed and scraped data" || echo "No changes to commit"
          git push origin live-data -f || echo "No changes to push"

      - name: Deploy data to TV Surge Host
        run: |
          for i in 1 2 3; do
            npx surge ./tv_deploy sdn-ptv.surge.sh && break || sleep 5
          done
        env:
          SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
